name: validate

# Render every model .scad with OpenSCAD and check the resulting mesh is
# watertight / 2-manifold. Validates geometry properties, not exact bytes
# (OpenSCAD STL output isn't deterministic enough to byte-compare).

on:
  pull_request:
    paths:
      - "**.scad"
      - "**.stl"
      - "tools/**"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

jobs:
  render-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openscad xvfb

      - name: Render + validate models
        run: xvfb-run -a tools/render.sh
